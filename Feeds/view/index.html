
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>News Feed</title>

<style>
    :root {
        --bg: #161618;
        --panel: #333335;
        --card: #333335;
        --border: #333335;
        --text: #FFFFFF;
        --muted: #818183;

        font-size: 16px;
    }

    @font-face {
        font-family: Ravi;
        font-style: normal;
        font-weight: normal;
        src: url('assets/fonts/woff/Ravi-Regular.woff') format('woff'),
             url('assets/fonts/woff2/Ravi-Regular.woff2') format('woff2');
    }

    @font-face {
        font-family: Ravi;
        font-style: normal;
        font-weight: bold;
        src: url('assets/fonts/woff/Ravi-Bold.woff') format('woff'),
             url('assets/fonts/woff2/Ravi-Bold.woff2') format('woff2');
    }

    @font-face {
        font-family: Ravi;
        font-style: normal;
        font-weight: 950;
        src: url('assets/fonts/woff/Ravi-ExtraBlack.woff') format('woff'),
             url('assets/fonts/woff2/Ravi-ExtraBlack.woff2') format('woff2');
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "Ravi", sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 0.75rem;
    }

    .container {
        width: 100%;
    }

    .header {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1rem;
        margin-bottom: 0.75rem;
    }

    .header h1 {
        font-size: 1.35rem;
        font-weight: 700;
        line-height: 1.4;
    }

    .header .meta {
        margin-top: 0.35rem;
        font-size: 0.75rem;
        color: var(--muted);
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr !important;
        gap: 0.75rem;
    }

    @media (min-width: 700px) {
        .grid {
            grid-template-columns: repeat(2, 1fr) !important;
        }
    }

    @media (min-width: 900px) {
        .grid {
            grid-template-columns: repeat(3, 1fr) !important;
        }
    }

    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        padding: 0.9rem;
        overflow: hidden;
        min-width: 0;
    }

    .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
        font-size: 0.75rem;
        color: var(--muted);
    }

    .title {
        font-size: 0.85rem;
        font-weight: 700;
        line-height: 1.7;
        word-break: break-word;
        overflow-wrap: anywhere;
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>آخرین خبرها</h1>
        <div class="meta">
            آخرین بروزرسانی: 2026-05-13 19:26:59
        </div>
    </div>

    <div class="grid">
        
    </div>

</div>

<div onclick="window.scrollTo({top:0, behavior:'smooth'})" style="
        position:fixed;
        bottom:20px;
        left:20px;
        width:55px;
        height:55px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        user-select:none;
        font-size:1.2rem;
        font-weight:600;

        background:rgba(255,255,255,0.02);
        backdrop-filter:blur(10px);
        -webkit-backdrop-filter:blur(10px);

        border:1px solid rgba(255,255,255,0.25);
        box-shadow:0 4px 20px rgba(0,0,0,0.25);
     ">بالا
</div>

</body>
</html>
